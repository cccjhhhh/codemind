# CodeMind Configuration

app:
  name: CodeMind
  version: 1.0.0

llm:
  provider: openai
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  model: gpt-4
  max_tokens: 4096
  temperature: 0.7

agent:
  max_iterations: 10
  timeout_seconds: 300

tools:
  enabled:
    - read_file
    - search_code
    - execute_command
    - web_search

safety:
  confirm_dangerous_operations: true
  max_file_size_mb: 10
  allowed_commands:
    - git status
    - git diff
    - git log
    - ls
    - cat

logging:
  level: INFO
  file: logs/codemind.log
